<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Select Language | Project Nexus

    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/global.css">

    <link
        rel="stylesheet"
        href="../css/animations.css">

</head>

<body>

<main class="container fade">

    <section class="hero">

        <div class="brand fade-down">

            <div class="logo float glow">

                ☀

            </div>

            <span class="company">

                Solar Eco Solutions

            </span>

            <h1>

                Project Nexus

            </h1>

        </div>

        <section class="message fade-up">

            <h2>

                Choose your language

            </h2>

            <p>

                Select the language you'd like to use during the customer experience simulation.

            </p>

        </section>

        <section class="language-options">

                      <button

                class="primary-button hover-lift"

                data-language="en">

                🇺🇸 English

            </button>

            <button

                class="primary-button hover-lift"

                data-language="pt">

                🇧🇷 Português

            </button>

        </section>

    </section>

</main>

<script src="../js/translations.js"></script>

<script src="../js/app.js"></script>

</body>

</html>
