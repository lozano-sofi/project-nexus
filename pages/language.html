<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Choose Language | Project Nexus

    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/global.css">

    <link
        rel="stylesheet"
        href="../css/animations.css">

</head>

<body>

<div class="background-glow"></div>

<main class="hero">

    <section class="hero-content">

        <header class="brand fade-down">

            <div class="logo float glow">

                ☀

            </div>

            <span class="company">

                Solar Eco Solutions

            </span>

            <h1>

                Project Nexus

            </h1>

            <p class="subtitle">

                Customer Experience Simulator

            </p>

        </header>

        <section class="message fade-up">

            <h2>

                Choose your language

            </h2>

            <p>

                Select your preferred language to begin the experience.

            </p>

        </section>

        <section class="language-options">

                      <button

                class="primary-button hover-lift"

                data-language="en">

                🇺🇸 English

            </button>

            <button

                class="primary-button hover-lift"

                data-language="pt">

                🇧🇷 Português

            </button>

        </section>

    </section>

</main>

<script src="../js/storage.js"></script>

<script src="../js/app.js"></script>

</body>

</html>
